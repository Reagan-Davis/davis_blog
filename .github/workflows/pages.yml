name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_URL or SUPABASE_ANON_KEY secret missing — using committed config.js if present"
            if [ ! -f language-desk/js/config.js ]; then
              echo "window.APP_CONFIG = { supabaseUrl: '', supabaseAnonKey: '' };" > language-desk/js/config.js
            fi
          else
            cat > language-desk/js/config.js <<EOF
          window.APP_CONFIG = {
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}'
          };
          EOF
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: language-desk

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
